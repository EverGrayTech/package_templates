repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/cruft/cruft
    rev: 2.16.0
    hooks:
      - id: cruft
        stages: [pre-push]
default_install_hook_types: [pre-commit, pre-push]
