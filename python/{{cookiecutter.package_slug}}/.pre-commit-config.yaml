repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/cruft/cruft
    rev: 2.5.0
    hooks:
      - id: cruft
        stages: [push]
default_install_hook_types: [pre-commit, pre-push]
